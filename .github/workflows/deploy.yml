name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-opencode-dashboard
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate
        run: |
          npm ci
          if npm pkg get scripts.lint | grep -qv null; then
            npm run lint
          fi
          npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
        env:
          DEPLOY_KEY: ${{ secrets.TANGO_WHISKEY_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ vars.TANGO_WHISKEY_HOST }}

      - name: Deploy on VM
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '/home/exedev/opencode-dashboard' && bash scripts/remote-deploy.sh"
        env:
          DEPLOY_HOST: ${{ vars.TANGO_WHISKEY_HOST }}
          DEPLOY_USER: ${{ vars.TANGO_WHISKEY_DEPLOY_USER }}
